<!DOCTYPE html>

<style>body{background-color:#1a202c;color:#e2e8f0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}.canvas-container{position:relative;width:100%;max-width:800px;margin:0 auto;border-radius:1rem;overflow:hidden;box-shadow:0 20px 25px -5px rgba(0,0,0,0.5),0 10px 10px -5px rgba(0,0,0,0.2);background-color:#2d3748}video,canvas{display:block;width:100%;height:auto;transform:scaleX(-1)}video{display:none}.loader{border:4px solid #4a5568;border-top:4px solid #63b3ed;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>

<script type="module">
document.addEventListener('contextmenu',e=>e.preventDefault());document.addEventListener('keydown',e=>{if(e.keyCode===123||(e.ctrlKey&&e.shiftKey&&e.keyCode===73)||(e.ctrlKey&&e.keyCode===85))e.preventDefault()});const oE=console.error;console.error=function(...a){if(a[0]&&typeof a[0]==='string'&&a[0].includes('XNNPACK'))return;oE.apply(console,a)};const oW=console.warn;console.warn=function(...a){if(a[0]&&typeof a[0]==='string'&&a[0].includes('XNNPACK'))return;oW.apply(console,a)};const oL=console.log;console.log=function(...a){if(a[0]&&typeof a[0]==='string'&&a[0].includes('XNNPACK'))return;oL.apply(console,a)};const oI=console.info;console.info=function(...a){if(a[0]&&typeof a[0]==='string'&&a[0].includes('XNNPACK'))return;oI.apply(console,a)};const v=document.getElementById("v"),cE=document.getElementById("cE"),cX=cE.getContext("2d"),sB=document.getElementById("sB"),sCB=document.getElementById("sCB"),bTB=document.getElementById("bTB"),sC=document.getElementById("sC"),sT=document.getElementById("sT"),vC=document.getElementById("vC"),eM=document.getElementById("eM");let fL,rM="VIDEO",wR=!1,lVT=-1,sBg=!1,uFC=!0;sB.addEventListener("click",eC);sCB.addEventListener("click",()=>{uFC=!uFC;if(wR){eC();setTimeout(eC,500)}});bTB.addEventListener("click",()=>{sBg=!sBg;bTB.innerText=sBg?"隱藏真實背景":"切換真實背景"});async function eC(){if(!fL){alert("請稍候，AI 模型還在載入中！");return}if(wR===!0){wR=!1;sB.innerText="開啟相機啟動 VTuber";sB.classList.replace("bg-red-600","bg-blue-600");sB.classList.replace("hover:bg-red-500","hover:bg-blue-500");vC.style.display="none";sCB.style.display="none";bTB.style.display="none";const s=v.srcObject;if(s){s.getTracks().forEach(t=>t.stop())}v.srcObject=null;return}wR=!0;sB.innerText="關閉 VTuber";sB.classList.replace("bg-blue-600","bg-red-600");sB.classList.replace("hover:bg-blue-500","hover:bg-red-500");eM.classList.add("hidden");const c={video:{facingMode:uFC?"user":"environment",width:{ideal:1280},height:{ideal:720}}};try{const s=await navigator.mediaDevices.get cE.height)}else{cX.fillStyle="#2d3748";cX.fillRect(0,0,cE.width,cE.height)}if(r.faceLandmarks&&r.faceLandmarks.length>0){dVA(cX,r.faceLandmarks[0],cE.width,cE.height)}}catch(e){}}window.requestAnimationFrame(pW)}function dVA(c,l,w,h){const P=i=>({x:l[i].x*w,y:l[i].y*h});const nT=P(1),iLF=P(234),iRF=P(454),iLEI=P(133),iREI=P(362),iLEO=P(33),iREO=P(263),iLET=P(159),iRET=P(386),iLEB=P(145),iREB=P(374),mT=P(13),mB=P(14),mL=P(61),mR=P(291);const cX=nT.x,cY=nT.y,fW=D(iLF,iRF),A=Math.atan2(iREI.y-iLEI.y,iREI.x-iLEI.x);const lEOR=D(iLET,iLEB)/D(iLEI,iLEO),rEOR=D(iRET,iREB)/D(iREI,iREO),iLB=lEOR<0.22,iRB=rEOR<0.22;const mO=D(mT,mB),mW=D(mL,mR),mRto=mO/mW;c.save();c.translate(cX,cY);c.rotate(A);const S=fW*1.5;c.fillStyle="#ffffff";c.beginPath();c.moveTo(-S*0.35,-S*0.3);c.lineTo(-S*0.5,-S*0.7);c.lineTo(-S*0.15,-S*0.45);c.fill();c.beginPath();c.moveTo(S*0.35,-S*0.3);c.lineTo(S*0.5,-S*0.7);c.lineTo(S*0.15,-S*0.45);c.fill();c.fillStyle="#fbcfe8";c.beginPath();c.moveTo(-S*0.35,-S*0.35);c.lineTo(-S*0.45,-S*0.6);c.lineTo(-S*0.2,-S*0.45);c.fill();c.beginPath();c.moveTo(S*0.35,-S*0.35);c.lineTo(S*0.45,-S*0.6);c.lineTo(S*0.2,-S*0.45);c.fill();c.fillStyle="#ffffff";c.beginPath();c.ellipse(0,0,S*0.5,S*0.45,0,0,Math.PI*2);c.fill();c.lineWidth=S*0.02;c.strokeStyle="#4a5568";c.stroke();c.fillStyle="rgba(251, 113, 133, 0.4)";c.beginPath();c.ellipse(-S*0.25,S*0.1,S*0.08,S*0.05,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(S*0.25,S*0.1,S*0.08,S*0.05,0,0,Math.PI*2);c.fill();c.fillStyle="#1a202c";if(iLB){c.beginPath();c.arc(-S*0.2,-S*0.05,S*0.08,Math.PI,0);c.stroke()}else{c.beginPath();let eH=S*0.08*(lEOR/0.3);if(eH>S*0.12)eH=S*0.12;c.ellipse(-S*0.2,-S*0.05,S*0.06,eH,0,0,Math.PI*2);c.fill();c.fillStyle="#ffffff";c.beginPath();c.arc(-S*0.22,-S*0.05-(eH*0.3),S*0.02,0,Math.PI*2);c.fill();c.fillStyle="#1a202c"}if(iRB){c.beginPath();c.arc(S*0.2,-S*0.05,S*0.08,Math.PI,0);c.stroke()}else{c.beginPath();let eH=S*0.08*(rEOR/0.3);if(eH>S*0.12)eH=S*0.12;c.ellipse(S*0.2,-S*0.05,S*0.06,eH,0,0,Math.PI*2);c.fill();c.fillStyle="#ffffff";c.beginPath();c.arc(S*0.18,-S*0.05-(eH*0.3),S*0.02,0,Math.PI*2);c.fill();c.fillStyle="#1a202c"}c.fillStyle="#fbcfe8";c.beginPath();c.moveTo(-S*0.04,S*0.1);c.lineTo(S*0.04,S*0.1);c.lineTo(0,S*0.15);c.fill();if(mRto>0.1){c.fillStyle="#ef4444";c.beginPath();let mH=S*0.15*mRto;c.ellipse(0,S*0.22,S*0.06,mH,0,0,Math.PI*2);c.fill()}else{c.strokeStyle="#4a5568";c.lineWidth=S*0.015;c.beginPath();c.arc(-S*0.05,S*0.18,S*0.05,0,Math.PI);c.stroke();c.beginPath();c.arc(S*0.05,S*0.18,S*0.05,0,Math.PI);c.stroke()}c.strokeStyle="#a0aec0";c.lineWidth=S*0.01;c.beginPath();c.moveTo(-S*0.3,S*0.1);c.lineTo(-S*0.5,S*0.05);c.stroke();c.beginPath();c.moveTo(-S*0.3,S*0.15);c.lineTo(-S*0.5,S*0.15);c.stroke();c.beginPath();c.moveTo(-S*0.3,S*0.2);c.lineTo(-S*0.5,S*0.25);c.stroke();c.beginPath();c.moveTo(S*0.3,S*0.1);c.lineTo(S*0.5,S*0.05);c.stroke();c.beginPath();c.moveTo(S*0.3,S*0.15);c.lineTo(S*0.5,S*0.15);c.stroke();c.beginPath();c.moveTo(S*0.3,S*0.2);c.lineTo(S*0.5,S*0.25);c.stroke();c.restore()}
